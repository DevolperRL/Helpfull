<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator - Create beautiful QR codes instantly</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      max-width: 650px;
      width: 100%;
    }
    
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2.5rem;
      color: #f8fafc;
      margin-bottom: 0.3rem;
    }
    
    .subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
    }
    
    .main-card {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      background: #0f172a;
      padding: 0.4rem;
      border-radius: 1.5rem;
    }
    
    .tab {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      background: transparent;
      color: #94a3b8;
      border-radius: 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    .tab.active {
      background: #6366f1;
      color: white;
    }
    
    .tab:hover:not(.active) {
      color: #e2e8f0;
      background: rgba(99, 102, 241, 0.1);
    }
    
    .input-area {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    
    textarea, input[type="text"], input[type="url"], input[type="email"], input[type="tel"] {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 1rem;
      color: #f8fafc;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }
    
    textarea:focus, input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    
    textarea {
      min-height: 100px;
    }
    
    .options-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .option-group {
      flex: 1;
      min-width: 120px;
    }
    
    .option-group label {
      margin-bottom: 0.3rem;
    }
    
    select, input[type="color"] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.8rem;
      color: #f8fafc;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }
    
    input[type="color"] {
      height: 45px;
      padding: 0.3rem;
    }
    
    .generate-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1.5rem;
    }
    
    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
    }
    
    .generate-btn:active {
      transform: translateY(0);
    }
    
    .qr-result {
      text-align: center;
      display: none;
    }
    
    .qr-result.show {
      display: block;
    }
    
    .qr-container {
      display: inline-block;
      background: white;
      padding: 1.5rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .qr-container img {
      display: block;
      max-width: 280px;
      height: auto;
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .action-btn {
      padding: 0.8rem 1.5rem;
      border: 2px solid #334155;
      background: transparent;
      color: #e2e8f0;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .action-btn:hover {
      background: #1e293b;
      border-color: #6366f1;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #64748b;
    }
    
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-state p {
      font-size: 1rem;
      line-height: 1.6;
    }
    
    .char-count {
      text-align: right;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .hidden {
      display: none;
    }
    
    footer {
      text-align: center;
      margin-top: 2rem;
      color: #64748b;
      font-size: 0.85rem;
    }
    
    @media (max-width: 500px) {
      .main-card { padding: 1.5rem 1rem; }
      .tabs { flex-wrap: wrap; }
      .tab { font-size: 0.8rem; padding: 0.6rem 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>✨ QR Code Generator</h1>
      <p class="subtitle">Turn anything into a scannable QR code in seconds</p>
    </header>

    <div class="main-card">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-type="text">📝 Text</button>
        <button class="tab" data-type="url">🔗 URL</button>
        <button class="tab" data-type="email">📧 Email</button>
        <button class="tab" data-type="phone">📞 Phone</button>
        <button class="tab" data-type="wifi">📶 WiFi</button>
      </div>

      <!-- Text Input -->
      <div class="input-area" id="inputTextArea">
        <label>What would you like to encode?</label>
        <textarea id="textInput" placeholder="Type anything... a message, a secret code, your WiFi password, whatever you want!" maxlength="2953"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 2953 characters</div>
      </div>

      <!-- URL Input -->
      <div class="input-area hidden" id="inputURLArea">
        <label>Enter a website URL</label>
        <input type="url" id="urlInput" placeholder="https://example.com" />
      </div>

      <!-- Email Input -->
      <div class="input-area hidden" id="inputEmailArea">
        <label>Email address</label>
        <input type="email" id="emailInput" placeholder="hello@example.com" />
        <label style="margin-top:0.8rem;">Subject (optional)</label>
        <input type="text" id="emailSubject" placeholder="Hello there!" />
        <label style="margin-top:0.8rem;">Body (optional)</label>
        <textarea id="emailBody" placeholder="Write your message..." style="min-height:80px;"></textarea>
      </div>

      <!-- Phone Input -->
      <div class="input-area hidden" id="inputPhoneArea">
        <label>Phone number</label>
        <input type="tel" id="phoneInput" placeholder="+1234567890" />
      </div>

      <!-- WiFi Input -->
      <div class="input-area hidden" id="inputWiFiArea">
        <label>Network name (SSID)</label>
        <input type="text" id="wifiSSID" placeholder="My WiFi Network" />
        <label style="margin-top:0.8rem;">Password</label>
        <input type="text" id="wifiPassword" placeholder="WiFi password" />
        <label style="margin-top:0.8rem;">Security type</label>
        <select id="wifiSecurity">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">No password</option>
        </select>
      </div>

      <!-- Customization Options -->
      <div class="options-row">
        <div class="option-group">
          <label>Size</label>
          <select id="sizeSelect">
            <option value="200">Small</option>
            <option value="300" selected>Medium</option>
            <option value="400">Large</option>
            <option value="500">Extra Large</option>
          </select>
        </div>
        <div class="option-group">
          <label>Foreground</label>
          <input type="color" id="fgColor" value="#000000" />
        </div>
        <div class="option-group">
          <label>Background</label>
          <input type="color" id="bgColor" value="#ffffff" />
        </div>
      </div>

      <!-- Generate Button -->
      <button class="generate-btn" id="generateBtn">
        🎨 Generate QR Code
      </button>

      <!-- Results Area -->
      <div class="qr-result" id="qrResult">
        <div class="qr-container">
          <img id="qrImage" src="" alt="Your QR code" />
        </div>
        <div class="action-buttons">
          <button class="action-btn" id="downloadBtn">
            ⬇️ Download PNG
          </button>
          <button class="action-btn" id="copyBtn">
            📋 Copy Image
          </button>
          <button class="action-btn" id="printBtn">
            🖨️ Print
          </button>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="icon">🎯</div>
        <p>Your QR code will appear here!<br>Type something above and hit generate.</p>
      </div>
    </div>

    <footer>
      🔒 Everything stays in your browser · No tracking · No ads
    </footer>
  </div>

  <script>
    (function() {
      // State
      let currentType = 'text';
      let currentQRData = null;
      let qrImageElement = document.getElementById('qrImage');

      // Tab switching
      const tabs = document.querySelectorAll('.tab');
      const inputAreas = {
        text: document.getElementById('inputTextArea'),
        url: document.getElementById('inputURLArea'),
        email: document.getElementById('inputEmailArea'),
        phone: document.getElementById('inputPhoneArea'),
        wifi: document.getElementById('inputWiFiArea')
      };

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          // Update active tab
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          // Show correct input
          currentType = tab.dataset.type;
          Object.keys(inputAreas).forEach(key => {
            inputAreas[key].classList.add('hidden');
          });
          inputAreas[currentType].classList.remove('hidden');
        });
      });

      // Character counter
      const textInput = document.getElementById('textInput');
      const charCount = document.getElementById('charCount');
      
      textInput.addEventListener('input', () => {
        charCount.textContent = textInput.value.length;
      });

      // Build the data string based on type
      function getDataString() {
        switch(currentType) {
          case 'text':
            return document.getElementById('textInput').value.trim();
          
          case 'url':
            let url = document.getElementById('urlInput').value.trim();
            if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
              url = 'https://' + url;
            }
            return url;
          
          case 'email':
            const email = document.getElementById('emailInput').value.trim();
            const subject = document.getElementById('emailSubject').value.trim();
            const body = document.getElementById('emailBody').value.trim();
            
            if (!email) return '';
            
            let mailto = `mailto:${email}`;
            const params = [];
            if (subject) params.push(`subject=${encodeURIComponent(subject)}`);
            if (body) params.push(`body=${encodeURIComponent(body)}`);
            if (params.length) mailto += '?' + params.join('&');
            
            return mailto;
          
          case 'phone':
            const phone = document.getElementById('phoneInput').value.trim();
            return phone ? `tel:${phone}` : '';
          
          case 'wifi':
            const ssid = document.getElementById('wifiSSID').value.trim();
            const password = document.getElementById('wifiPassword').value.trim();
            const security = document.getElementById('wifiSecurity').value;
            
            if (!ssid) return '';
            return `WIFI:T:${security};S:${ssid};P:${password};;`;
          
          default:
            return '';
        }
      }

      // Generate QR code
      async function generateQR() {
        const data = getDataString();
        
        if (!data) {
          alert('Please enter something first! 😊');
          return;
        }

        const size = document.getElementById('sizeSelect').value;
        const fgColor = document.getElementById('fgColor').value.replace('#', '');
        const bgColor = document.getElementById('bgColor').value.replace('#', '');
        
        // Use quickchart.io QR API
        const qrUrl = `https://quickchart.io/qr?text=${encodeURIComponent(data)}&size=${size}&dark=${fgColor}&light=${bgColor}`;
        
        // Show loading
        qrImageElement.src = qrUrl;
        qrImageElement.onload = () => {
          currentQRData = qrUrl;
          document.getElementById('qrResult').classList.add('show');
          document.getElementById('emptyState').style.display = 'none';
        };
        
        qrImageElement.onerror = () => {
          alert('Oops! Could not generate QR code. The text might be too long or contains unsupported characters.');
        };
      }

      // Download QR code
      async function downloadQR() {
        if (!currentQRData) return;
        
        try {
          const response = await fetch(currentQRData);
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = `qr-code-${Date.now()}.png`;
          a.click();
          
          URL.revokeObjectURL(url);
        } catch (e) {
          alert('Could not download. Try right-clicking the QR code and "Save Image As..."');
        }
      }

      // Copy QR to clipboard
      async function copyQR() {
        if (!currentQRData) return;
        
        try {
          const response = await fetch(currentQRData);
          const blob = await response.blob();
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          alert('✅ QR code copied to clipboard!');
        } catch (e) {
          // Fallback: open in new tab for copying
          window.open(currentQRData, '_blank');
          alert('QR code opened in new tab. You can save it from there!');
        }
      }

      // Print QR code
      function printQR() {
        if (!currentQRData) return;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
          <html>
            <head><title>QR Code</title></head>
            <body style="display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
              <img src="${currentQRData}" style="max-width:400px;" />
            </body>
          </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => printWindow.print(), 500);
      }

      // Event listeners
      document.getElementById('generateBtn').addEventListener('click', generateQR);
      document.getElementById('downloadBtn').addEventListener('click', downloadQR);
      document.getElementById('copyBtn').addEventListener('click', copyQR);
      document.getElementById('printBtn').addEventListener('click', printQR);

      // Generate on Enter key
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          generateQR();
        }
      });

      // Handle URL params
      const params = new URLSearchParams(window.location.search);
      const textParam = params.get('text');
      if (textParam) {
        document.getElementById('textInput').value = textParam;
        charCount.textContent = textParam.length;
        setTimeout(generateQR, 300);
      }
    })();
  </script>
</body>
</html>
